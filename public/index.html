<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Créer un CV en ligne</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</head>
<style>
    body{
font-family: 'Segoe UI', sans-serif;
margin:0;
background: linear-gradient(135deg,#11cb65,#1a1a1b);
min-height:100vh;
color:white;
overflow-x:hidden;
}

/* NAVBAR */
.logo-icon{
    width:70px;
    height:70px;

    background:linear-gradient(135deg,#007aff,#5ac8fa);

    border-radius:18px;
    display:flex;
    align-items:center;
    justify-content:center;

    margin:auto;
    margin-bottom:15px;

    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:rgba(255,255,255,0.15);
backdrop-filter: blur(15px);
border-bottom:1px solid rgba(255,255,255,0.2);
}

.navbar nav a{
margin:0 12px;
text-decoration:none;
color:white;
font-weight:500;
transition:0.3s;
}

.navbar nav a:hover{
opacity:0.7;
}

.create-btn{
background:linear-gradient(45deg,#ff7a18,#ff3d77);
color:white;
border:none;
padding:10px 20px;
border-radius:20px;
cursor:pointer;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
transition:0.3s;
}

.create-btn:hover{
transform:scale(1.05);
}

/* CONTAINER */

.container{
display:flex;
gap:50px;
padding:50px;
flex-wrap:wrap;
}
.auth-container{
    width:420px;
    margin:auto;
    padding:40px;

    /* effet bulle iOS */
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);

    border-radius:25px;
    border:1px solid rgba(255,255,255,0.3);

    /* ombre douce */
    box-shadow:0 20px 40px rgba(0,0,0,0.15);

    text-align:center;
}
/* LEFT PANEL */

.left-panel{
flex:1;
max-width:420px;
}

.left-panel h1{
font-size:38px;
margin-bottom:10px;
}

.description{
opacity:0.8;
margin-bottom:25px;
}

/* BUTTONS */

.btn{
display:block;
width:100%;
padding:16px;
margin-bottom:15px;
border:none;
border-radius:30px;
cursor:pointer;
font-weight:bold;
font-size:15px;
transition:0.3s;
}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.linkedin{
background:linear-gradient(45deg,#0077b5,#00a0dc);
color:white;
}

.create-cv{
background:linear-gradient(45deg,#00c6ff,#0072ff);
color:white;
}

.import-cv{
background:rgba(255,255,255,0.2);
color:white;
backdrop-filter:blur(10px);
}

.pdf-btn{
background:linear-gradient(45deg,#ff416c,#ff4b2b);
color:white;
}

/* RIGHT PANEL CV */

.right-panel{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(25px);
padding:40px;
border-radius:25px;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
flex:1;
max-width:600px;
animation:fadeIn 0.7s ease;
}

/* PHOTO */

.profile-photo{
width:100px;
height:100px;
border-radius:50%;
border:4px solid white;
object-fit:cover;
}

/* HEADER CV */

.cv-header{
display:flex;
align-items:center;
gap:20px;
}

/* SECTIONS */

.section{
margin-top:20px;
}

.section-title{
font-weight:bold;
border-bottom:2px solid white;
display:inline-block;
margin-bottom:10px;
}

/* TEMPLATES */

.template1{
border-left:8px solid #00c6ff;
}

.template2{
border-left:8px solid #32bb6b;
}

.template3{
border-left:8px solid #ffd200;
}

/* TEMPLATE SELECT */

.template-selector{
position:fixed;
bottom:20px;
right:20px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:15px 20px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

/* ANIMATION */

h1{
    font-size:32px;
    font-weight:700;
    margin-bottom:5px;
}

.subtitle{
    color:#6b7280;
    font-size:15px;
}
@keyframes fadeIn{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* BULLES IOS */

.bubble{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.2);
backdrop-filter:blur(5px);
animation:float 12s infinite ease-in-out;
}

.bubble1{
width:120px;
height:120px;
top:80%;
left:10%;
}

.bubble2{
width:80px;
height:80px;
top:20%;
left:80%;
animation-duration:10s;
}

.bubble3{
width:60px;
height:60px;
top:60%;
left:70%;
animation-duration:14s;
}

@keyframes float{

0%{transform:translateY(0px)}
50%{transform:translateY(-40px)}
100%{transform:translateY(0px)}

}
</style>
<body>

<header class="navbar">

<div class="logo">
<span>CV Pro</span>
</div>
<button class="create-btn">
<a href="auth.html">Créer mon CV</a>
</button>

</header>


<main class="container">

<!-- LEFT PANEL -->

<section class="left-panel">

<h1>Créer un CV en ligne gratuitement</h1>

<p class="description">
Rédiger son CV n'a jamais été aussi simple !
</p>



<button class="btn create-cv" id="createCvBtn">
<a href="auth.html">Créer un nouveau CV</a>
</button>

</section>


<!-- RIGHT PANEL -->

<section class="right-panel template1" id="cvPreview">

<div class="cv-header">

<img class="profile-photo" id="cvPhoto" src="logo IAM.png">

<div>

<h2 id="cvName">Elvis</h2>
<h3 id="cvTitle">Titre du poste</h3>

</div>

</div>


<div class="section">

<p class="section-title">Profil</p>

<p id="cvProfile">
Décrivez votre profil ici
</p>

</div>


<div class="section">

<p class="section-title">Contact</p>

<ul class="info-list">

<li id="cvEmail">email@email.com</li>

<li id="cvPhone">Téléphone</li>

</ul>

</div>

</section>

</main>


<script src="script.js"></script>
<div class="bubble bubble1"></div>
<div class="bubble bubble2"></div>
<div class="bubble bubble3"></div>
<script>
    
// boutons

document.getElementById("importLinkedinBtn").addEventListener("click",function(){

alert("Import Linkedin bientôt disponible")

})

document.getElementById("createCvBtn").addEventListener("click",function(){

alert("Création CV bientôt disponible")

})

document.getElementById("importCvBtn").addEventListener("click",function(){

alert("Import CV bientôt disponible")

})


// changer template

document.getElementById("templateSelect").addEventListener("change",function(){

let cv = document.getElementById("cvPreview")

cv.className = "right-panel " + this.value

})


// télécharger PDF

function downloadPDF(){

let element = document.getElementById("cvPreview")

let opt = {

margin:0.5,
filename:'mon_cv.pdf',
image:{type:'jpeg',quality:1},
html2canvas:{scale:2},
jsPDF:{unit:'in',format:'letter',orientation:'portrait'}

}

html2pdf().set(opt).from(element).save()

}
</script>
</body>
</html>
